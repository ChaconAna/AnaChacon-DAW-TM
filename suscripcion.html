<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suscripción - La Nación</title>

    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="suscripcion.css">
</head>

<body>

    <header>
        <div class="top-bar">
            <div class="top-left">
                Capital Federal ☀️ 16.7°
            </div>

            <div class="top-center">
                <span>CLUB LN</span>
                <span>EN VIVO</span>
                <span>FOODIT</span>
                <span>CANCHALLENA</span>
            </div>

            <div class="top-right">
                <button class="login">INICIAR SESIÓN</button>
            </div>
        </div>

        <div class="header-top">
            <img src="https://gda.com/wp-content/themes/gda/images/la-nacion.png" alt="La Nación">
        </div>
    </header>

    <main>

        <h1 id="titulo">HOLA</h1>

        <form id="formulario">

            <div class="campo">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre">
                <small class="error"></small>
            </div>

            <div class="campo">
                <label for="email">Email</label>
                <input type="text" id="email">
                <small class="error"></small>
            </div>

            <div class="campo">
                <label for="password">Contraseña</label>
                <input type="password" id="password">
                <small class="error"></small>
            </div>

            <div class="campo">
                <label for="repetirPassword">Repetir contraseña</label>
                <input type="password" id="repetirPassword">
                <small class="error"></small>
            </div>

            <div class="campo">
                <label for="edad">Edad</label>
                <input type="number" id="edad">
                <small class="error"></small>
            </div>

            <div class="campo">
                <label for="telefono">Teléfono</label>
                <input type="text" id="telefono">
                <small class="error"></small>
            </div>

            <div class="campo">
                <label for="direccion">Dirección</label>
                <input type="text" id="direccion">
                <small class="error"></small>
            </div>

            <div class="campo">
                <label for="ciudad">Ciudad</label>
                <input type="text" id="ciudad">
                <small class="error"></small>
            </div>

            <div class="campo">
                <label for="cp">Código Postal</label>
                <input type="text" id="cp">
                <small class="error"></small>
            </div>

            <div class="campo">
                <label for="dni">DNI</label>
                <input type="text" id="dni">
                <small class="error"></small>
            </div>

            <div class="contenedor-boton">
                <button type="submit">Enviar</button>
            </div>

        </form>

    </main>
    
    <footer>
        <p>
            © Copyright 2026 SA LA NACION |
            Todos los derechos reservados.
        </p>
    </footer>

    <script src="suscripcion.js"></script>

</body>

</html>
